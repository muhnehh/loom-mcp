name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test

      - name: Run benchmark
        run: node eval/benchmark.js . --json
        continue-on-error: true

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Check for TODO comments
        run: |
          if grep -r "TODO" src/ --include="*.ts" | grep -v "// TODO:" | grep -v "TODO:" | grep -v "# TODO"; then
            echo "Found TODO comments that need addressing"
            grep -r "TODO" src/ --include="*.ts" | grep -v "// TODO:" | grep -v "TODO:" | grep -v "# TODO"
            exit 1
          fi

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view @loom-mcp/server@$VERSION --json 2>/dev/null | grep -q '"version"'; then
            echo "Version $VERSION already published, skipping..."
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}